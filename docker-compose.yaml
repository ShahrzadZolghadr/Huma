version: "3.9"

services:

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo

    volumes:
      - postgres_data:/var/lib/postgresql/data

  odoo:
    image: odoo:17.0
    restart: unless-stopped
    depends_on:
      - db

    ports:
      - "8069:8069"

    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo

    volumes:
      - odoo_data:/var/lib/odoo

  huma-agent:
    build: .

    restart: unless-stopped

    depends_on:
      - odoo

    env_file:
      - .env

    volumes:
      - ./data:/app/data

volumes:
  postgres_data:
  odoo_data: